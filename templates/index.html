<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Classification App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 500px;
            width: 100%;
            backdrop-filter: blur(10px);
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            font-size: 2.5em;
            font-weight: 700;
        }

        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 15px;
            padding: 40px 20px;
            margin-bottom: 25px;
            transition: all 0.3s ease;
            cursor: pointer;
            background: rgba(102, 126, 234, 0.05);
        }

        .upload-area:hover {
            border-color: #764ba2;
            background: rgba(118, 75, 162, 0.1);
            transform: translateY(-2px);
        }

        .upload-area.dragover {
            border-color: #764ba2;
            background: rgba(118, 75, 162, 0.2);
        }

        .upload-icon {
            font-size: 3em;
            color: #667eea;
            margin-bottom: 15px;
        }

        .upload-text {
            color: #666;
            font-size: 1.1em;
            margin-bottom: 15px;
        }

        .file-input {
            display: none;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 10px 5px;
            min-width: 120px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .result {
            margin-top: 30px;
            padding: 20px;
            border-radius: 15px;
            display: none;
        }

        .result.success {
            background: linear-gradient(135deg, #4CAF50, #45a049);
            color: white;
        }

        .result.error {
            background: linear-gradient(135deg, #f44336, #d32f2f);
            color: white;
        }

        .prediction-details {
            margin-top: 15px;
        }

        .class-name {
            font-size: 1.8em;
            font-weight: bold;
            margin-bottom: 15px;
            text-transform: capitalize;
        }

        .audio-player {
            margin-top: 20px;
            width: 100%;
        }

        .audio-player audio {
            width: 100%;
            outline: none;
        }

        .loading {
            display: none;
            margin-top: 20px;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .selected-file {
            margin-top: 15px;
            padding: 10px;
            background: rgba(102, 126, 234, 0.1);
            border-radius: 10px;
            color: #667eea;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Audio Classifier</h1>
        
        <div class="upload-area" id="uploadArea">
            <div class="upload-text">
                <strong>Click to upload</strong> or drag and drop<br>
                <small>WAV files only</small>
            </div>
            <input type="file" id="audioFile" class="file-input" accept=".wav" />
        </div>

        <div id="selectedFile" class="selected-file" style="display: none;"></div>

        <button class="btn" id="uploadBtn" disabled>
            Classify Audio
        </button>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Processing audio...</p>
        </div>

        <div class="result" id="result">
            <div class="prediction-details">
                <div class="class-name" id="className"></div>
            </div>
            <div class="audio-player" id="audioPlayer" style="display: none;">
                <h4>Play Audio:</h4>
                <audio controls id="audioElement">
                    Your browser does not support the audio element.
                </audio>
            </div>
        </div>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('audioFile');
        const uploadBtn = document.getElementById('uploadBtn');
        const result = document.getElementById('result');
        const loading = document.getElementById('loading');
        const selectedFile = document.getElementById('selectedFile');

        // Click to upload
        uploadArea.addEventListener('click', () => {
            fileInput.click();
        });

        // Drag and drop functionality
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                handleFileSelection(files[0]);
            }
        });
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFileSelection(e.target.files[0]);
            }
        });

        function handleFileSelection(file) {
            if (file.name.toLowerCase().endsWith('.wav')) {
                uploadBtn.disabled = false;
                selectedFile.style.display = 'block';
                selectedFile.textContent = `Selected: ${file.name}`;
                result.style.display = 'none';
            } else {
                showResult('Please select a WAV file.', 'error');
                uploadBtn.disabled = true;
                selectedFile.style.display = 'none';
            }
        }

        // Upload button click handler
        uploadBtn.addEventListener('click', () => {
            const file = fileInput.files[0];
            if (!file) {
                showResult('Please select a file first.', 'error');
                return;
            }

            uploadFile(file);
        });

        async function uploadFile(file) {
            const formData = new FormData();
            formData.append('audio_file', file);

            // Show loading
            loading.style.display = 'block';
            result.style.display = 'none';
            uploadBtn.disabled = true;

            try {
                const response = await fetch('/upload', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (data.success) {
                    showResult('Classification successful!', 'success');
                    document.getElementById('className').textContent = data.predicted_class.replace('_', ' ');
                    
                    // Setup audio player
                    const audioPlayer = document.getElementById('audioPlayer');
                    const audioElement = document.getElementById('audioElement');
                    audioElement.src = data.audio_url;
                    audioPlayer.style.display = 'block';
                } else {
                    showResult(data.error || 'Classification failed.', 'error');
                }
            } catch (error) {
                showResult('Error uploading file. Please try again.', 'error');
                console.error('Upload error:', error);
            } finally {
                loading.style.display = 'none';
                uploadBtn.disabled = false;
            }
        }

        function showResult(message, type) {
            result.className = `result ${type}`;
            result.style.display = 'block';
            
            if (type === 'error') {
                result.innerHTML = `<div style="font-size: 1.2em; font-weight: bold;">${message}</div>`;
                document.getElementById('audioPlayer').style.display = 'none';
            }
        }
    </script>
</body>
</html>
